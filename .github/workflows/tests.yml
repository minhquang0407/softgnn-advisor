name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lightweight dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run provider/schema tests
        run: |
          python -m pytest tests/test_llm_provider.py tests/test_llm_test_schema.py -q
